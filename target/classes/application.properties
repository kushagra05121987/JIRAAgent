spring.application.name=jira-agent

spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-4o
spring.ai.openai.chat.options.temperature=0.0
spring.ai.chat.client.advisor.native-structured-output.enabled=true

server.port=8080
logging.level.com.example.jiraagent=DEBUG

# --- SQLite datasource (point to the generated jira.db) ---
spring.datasource.url=jdbc:sqlite:${JIRA_DB_PATH:jira.db}
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.maximum-pool-size=10

# --- Executor tuning ---
agent.executor.page-size=1
# 500 items × ~6 graph ops each (nodes + edges + retries) = ~3000 minimum; 10000 gives safe headroom
agent.executor.maxIterations=10000

agent.executor.use-graph=true
agent.executor.max-offset=1000000

agent.planner.max-attempts=2
agent.planner.max-review-attempts=3

# --- Groundedness guardrail (RAGAS faithfulness) ---
agent.guardrail.groundedness.enabled=true
agent.guardrail.groundedness.threshold=0.8

# --- RAGAS provider config (its own LLM pipeline, separate from spring.ai.openai.*) ---
# Prevents RAGAS from picking up the main app's OpenAiChatModel bean which has
# native-structured-output=true and breaks RAGAS's internal GenerateStatements prompt
spring.ai.ragas.providers.auto-detect-beans=false
spring.ai.ragas.providers.openai-compatible[0].name=openai
spring.ai.ragas.providers.openai-compatible[0].base-url=https://api.openai.com
spring.ai.ragas.providers.openai-compatible[0].api-key=${OPENAI_API_KEY}
spring.ai.ragas.providers.openai-compatible[0].chat-models[0].id=gpt-4o-mini
spring.ai.ragas.providers.default-options.temperature=0.0
